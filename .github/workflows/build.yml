name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore tests/JsonPathPlus.Tests/JsonPathPlus.Tests.csproj

      - name: Build
        run: dotnet build tests/JsonPathPlus.Tests/JsonPathPlus.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/JsonPathPlus.Tests/JsonPathPlus.Tests.csproj --configuration Release --no-build --no-restore --verbosity normal