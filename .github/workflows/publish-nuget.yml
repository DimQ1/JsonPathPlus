name: Publish NuGet Package

on:
  push:
    branches:
      - release_*

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Extract Version From Branch
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#release_}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Branch must match release_<major.minor.patch>, got: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore tests/JsonPathPlus.Tests/JsonPathPlus.Tests.csproj

      - name: Build
        run: dotnet build tests/JsonPathPlus.Tests/JsonPathPlus.Tests.csproj --configuration Release --no-restore /p:Version=$PACKAGE_VERSION

      - name: Test
        run: dotnet test tests/JsonPathPlus.Tests/JsonPathPlus.Tests.csproj --configuration Release --no-build --no-restore --verbosity normal

      - name: Pack
        run: dotnet pack JsonPathPlus.csproj --configuration Release --no-build --output ./nupkg /p:PackageVersion=$PACKAGE_VERSION

      - name: Publish to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate