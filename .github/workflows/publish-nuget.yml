name: Publish NuGet Package

on:
  push:
    branches:
      - release_*

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
            11.0.x

      - name: Extract Version From Branch
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#release_}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Branch must match release_<major.minor.patch>, got: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Add GitHub Packages source
        run: dotnet nuget add source --username DimQ1 --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/DimQ1/index.json"

      - name: Restore
        run: dotnet restore tests/JsonPathPlus.Tests/JsonPathPlus.Tests.csproj

      - name: Build
        run: dotnet build tests/JsonPathPlus.Tests/JsonPathPlus.Tests.csproj --configuration Release --no-restore /p:Version=$PACKAGE_VERSION

      - name: Test
        run: dotnet test tests/JsonPathPlus.Tests/JsonPathPlus.Tests.csproj --configuration Release --no-build --no-restore --verbosity normal

      - name: Pack
        run: dotnet pack JsonPathPlus.csproj --configuration Release --no-build --output ./nupkg /p:PackageVersion=$PACKAGE_VERSION

      - name: Publish to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "github" --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ env.PACKAGE_VERSION }}" \
            --title "v${{ env.PACKAGE_VERSION }}" \
            --generate-notes \
            --target "${{ github.sha }}"